apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-app
  template:
    metadata:
      labels:
        app: product-app
    spec:
      containers:
      - name: product-container
        image: 1oumaima2/gestion-produits:1
        ports:
        - containerPort: 5000
        imagePullPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  type: NodePort
  selector:
    app: product-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30001