apiVersion: apps/v1
kind: Deployment
metadata:
  name: phishing-app-deployment
  labels:
    app: phishing-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phishing-detection
  template:
    metadata:
      labels:
        app: phishing-detection
    spec:
      containers:
      - name: phishing-container
        # REMPLACE 'ton-pseudo' par ton nom d'utilisateur Docker Hub
        image: ton-pseudo/phishing-detection:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: phishing-service
spec:
  type: NodePort
  selector:
    app: phishing-detection
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30001  # Port ouvert dans ton main.tf Azure